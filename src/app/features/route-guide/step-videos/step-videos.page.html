<ion-content [fullscreen]="true" [scrollEvents]="true">
  <div class="sv-header">
    <h2 class="sv-title" *ngIf="step">{{ step.title }}</h2>
    <p class="sv-subtitle">Ziyaret Videoları</p>
  </div>

  <div class="sv-list" *ngIf="step?.videos">
    <button
      class="sv-item"
      *ngFor="let video of step!.videos; let i = index"
      (click)="playVideo(video.url)"
    >
      <div class="sv-item-left">
        <span class="sv-num">{{ i + 1 }}</span>
      </div>
      <span class="sv-label">{{ video.label }}</span>
      <ion-icon name="play-circle-outline" class="sv-play-icon"></ion-icon>
    </button>
  </div>

  <div class="sv-empty" *ngIf="!step">
    <p>İçerik bulunamadı.</p>
  </div>
</ion-content>

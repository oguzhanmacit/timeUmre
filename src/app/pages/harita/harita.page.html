<ion-content [fullscreen]="true" [scrollEvents]="true">
  <div *ngIf="locationError" class="location-error">
    <ion-icon name="warning-outline"></ion-icon>
    {{ locationError }}
  </div>

  <div class="map-outer">
    <div #mapContainer class="map-container"></div>

    <button
      class="locate-btn"
      (click)="centerOnUser()"
      aria-label="Konumumu bul"
    >
      <ion-icon name="locate-outline"></ion-icon>
    </button>
  </div>
</ion-content>

<!-- Bottom navigation -->
<div class="nf-bottom-nav">
  <button
    class="nf-tab"
    [class.active]="activeTab === 'home'"
    (click)="setTab('home')"
  >
    <ion-icon name="home-outline"></ion-icon>
    <span>Ana Sayfa</span>
  </button>
  <!-- <button class="nf-tab" [class.active]="activeTab === 'search'" (click)="setTab('search')">
    <ion-icon name="search-outline"></ion-icon>
    <span>Ara</span>
  </button> -->
  <button
    class="nf-tab"
    [class.active]="activeTab === 'notes'"
    (click)="setTab('notes')"
  >
    <ion-icon name="document-text-outline"></ion-icon>
    <span>Notlarım</span>
  </button>
  <button class="nf-tab nf-tab--explore" (click)="setTab('explore')">
    <div class="nf-explore-btn">
      <ion-icon name="map-outline"></ion-icon>
    </div>
    <span>Keşfet</span>
  </button>
  <button
    class="nf-tab"
    [class.active]="activeTab === 'downloads'"
    (click)="setTab('downloads')"
  >
    <ion-icon name="download-outline"></ion-icon>
    <span>İndirilenler</span>
  </button>
  <button
    class="nf-tab"
    [class.active]="activeTab === 'profile'"
    (click)="setTab('profile')"
  >
    <ion-icon name="person-outline"></ion-icon>
    <span>Profil</span>
  </button>
</div>
